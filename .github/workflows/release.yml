name: Build installers

on:
  # Builds an installer for every push to main, plus on demand.
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release:
        description: "Publish a draft GitHub Release with the artifacts"
        required: false
        default: "false"

# Don't pile up duplicate runs for the same branch.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows .msi/.exe
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            label: macOS .dmg (Apple Silicon)
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            label: Linux .deb/.AppImage
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install JS deps
        run: npm ci

      - name: Build app + bundle installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Only create / update a draft release on tag pushes, or when the
          # workflow was dispatched with `release=true`.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustapp-${{ matrix.target }}
          if-no-files-found: warn
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
